name: E2E Tests on AWS Blocks Local Emulation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        default: '20.x'
        type: choice
        options:
          - '18.x'
          - '20.x'
          - '22.x'

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  test-e2e-chrome:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    env:
      node-version: ${{ inputs.node-version || '20.x' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.node-version }}
        cache: 'npm'

    - name: Install root dependencies
      run: npm ci

    - name: Install Backend dependencies
      run: cd backend && npm ci

    - name: Install Frontend dependencies
      run: cd frontend && npm ci

    - name: Install Playwright Browsers (Chrome)
      run: npx playwright install --with-deps chromium

    - name: Build Backend TypeScript
      run: cd backend && npm run build

    - name: Build Frontend (Vite)
      run: cd frontend && npm run build

    - name: Run E2E Tests (Chrome only)
      run: npm run test:e2e
      env:
        NODE_ENV: test
        CI: true

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30

    - name: Prepare GitHub Pages Report
      if: always()
      run: |
        mkdir -p gh-pages
        
        # Copy Playwright report
        if [ -d "playwright-report" ]; then
          cp -r playwright-report gh-pages/
          echo "✅ Playwright report copied"
        fi
        
        # Create index page with links
        cat > gh-pages/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>E2E Test Results</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; }
            .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
            h1 { color: #0366d6; border-bottom: 4px solid #0366d6; padding-bottom: 15px; margin-bottom: 30px; }
            .report-link { display: inline-block; margin: 15px 0; padding: 14px 24px; background: #0366d6; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: all 0.3s; }
            .report-link:hover { background: #0256c7; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(3, 102, 214, 0.3); }
            .info { background: #f6f8fa; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 5px solid #0366d6; }
            .info p { margin: 8px 0; color: #333; }
            .timestamp { color: #666; font-size: 14px; }
            ul { margin: 10px 0 10px 20px; }
            li { margin: 5px 0; }
          </style>
        </head>
        <body>
          <div class="container">
            <h1>🧪 E2E Test Results Report</h1>
            
            <div class="info">
              <p><strong>Framework:</strong> Playwright (Chrome only)</p>
              <p><strong>Total Tests:</strong> 28 E2E tests</p>
              <p><strong>Test Scenarios:</strong></p>
              <ul>
                <li>Authentication (Login/Register/Logout)</li>
                <li>Chat Communication</li>
                <li>File Upload (S3 Emulation)</li>
                <li>AI Response Generation (Bedrock Emulation)</li>
              </ul>
            </div>
            
            <h2 style="color: #333; margin-top: 30px; margin-bottom: 15px;">📊 Reports</h2>
            <a href="playwright-report/index.html" class="report-link">📈 View Detailed Playwright HTML Report</a>
            
            <div class="info" style="margin-top: 30px;">
              <p><strong>Generated:</strong> <span id="timestamp"></span></p>
              <p><strong>CI Run:</strong> <span id="run-id"></span></p>
            </div>
          </div>
          
          <script>
            const timestamp = new Date().toLocaleString();
            document.getElementById('timestamp').textContent = timestamp;
            
            const params = new URLSearchParams(window.location.search);
            const runId = params.get('run') || 'View in Actions tab';
            document.getElementById('run-id').textContent = runId;
          </script>
        </body>
        </html>
        EOF
        
        echo "✅ Index page created"

    - name: Deploy to GitHub Pages
      if: always() && github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gh-pages
        keep_files: true
        destination_dir: reports/${{ github.run_number }}
        allow_empty_commit: true
        force_orphan: false

    - name: Comment PR with Test Results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const testResultsPath = 'test-results';
          
          let message = '## 🧪 E2E Test Results (Chrome)\n\n';
          
          if (fs.existsSync(testResultsPath)) {
            const files = fs.readdirSync(testResultsPath);
            if (files.length > 0) {
              message += `✅ Tests completed on Node.js ${{ env.node-version }}\n`;
              message += `📊 Reports:\n`;
              message += `- [GitHub Actions Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
              message += `- [Playwright Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }})\n`;
            }
          } else {
            message += `⚠️ Could not find test results\n`;
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          }).catch(err => console.log('Could not comment on PR:', err));

  verify-aws-blocks-emulation:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install all dependencies
      run: npm ci && cd backend && npm ci

    - name: Verify AWS Blocks Backend Health
      run: |
        timeout 30 npm run start:backend:local &
        sleep 5
        
        # Check backend health endpoint
        response=$(curl -s -w "\n%{http_code}" http://localhost:3001/health)
        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | head -n-1)
        
        if [ "$http_code" == "200" ]; then
          echo "✅ AWS Blocks Backend health check passed"
          echo "$body"
        else
          echo "❌ AWS Blocks Backend health check failed (HTTP $http_code)"
          exit 1
        fi
      env:
        NODE_ENV: test

    - name: Verify AWS Blocks Local Data Directory
      run: |
        if [ -d ".bb-data" ]; then
          echo "✅ .bb-data directory exists (AWS Blocks local emulation active)"
          ls -la .bb-data/ || echo "Directory is empty (first run)"
        else
          echo "⚠️ .bb-data directory not found (may be created during runtime)"
        fi

  test-summary:
    runs-on: ubuntu-latest
    needs: [test-e2e-chrome, verify-aws-blocks-emulation]
    if: always()
    
    steps:
    - name: Test Results Summary
      run: |
        echo "## E2E Test Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Configuration" >> $GITHUB_STEP_SUMMARY
        echo "- **Framework**: Playwright (Chrome only)" >> $GITHUB_STEP_SUMMARY
        echo "- **Backend**: Express + AWS Blocks SDK" >> $GITHUB_STEP_SUMMARY
        echo "- **Frontend**: React (Vite)" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: AWS Blocks Local Emulation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Emulated AWS Services" >> $GITHUB_STEP_SUMMARY
        echo "- ✓ DynamoDB (ChatMessages, Users, Sessions)" >> $GITHUB_STEP_SUMMARY
        echo "- ✓ S3 (File Storage)" >> $GITHUB_STEP_SUMMARY
        echo "- ✓ Cognito (Authentication)" >> $GITHUB_STEP_SUMMARY
        echo "- ✓ Bedrock (AI Response Generation)" >> $GITHUB_STEP_SUMMARY
        echo "- ✓ Lambda (Async Processing)" >> $GITHUB_STEP_SUMMARY
        echo "- ✓ SES (Email Notifications)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Scenarios" >> $GITHUB_STEP_SUMMARY
        echo "- Authentication (Login/Register/Logout)" >> $GITHUB_STEP_SUMMARY
        echo "- Chat Communication" >> $GITHUB_STEP_SUMMARY
        echo "- File Upload (S3 Emulation)" >> $GITHUB_STEP_SUMMARY
        echo "- AI Response Generation (Bedrock Emulation)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.test-e2e-chrome.result }}" == "success" ]; then
          echo "### Result: ✅ All E2E Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Detailed Report on GitHub Pages](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
        else
          echo "### Result: ❌ Some E2E Tests Failed" >> $GITHUB_STEP_SUMMARY
        fi
